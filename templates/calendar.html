{% extends "base.html" %}

{% block content %}
<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="section-title mb-0">Calendario de Eventos</h1>
        <div class="d-flex gap-2">
            <button id="prevMonth" class="btn btn-outline-secondary">
                <i class="fas fa-chevron-left"></i>
            </button>
            <span id="currentMonthYear" class="fw-bold" style="font-size: 1.3rem; min-width: 150px; text-align: center;"></span>
            <button id="nextMonth" class="btn btn-outline-secondary">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-0">
            <div id="calendarGrid" class="p-3"></div>
        </div>
    </div>
</div>

<!-- Modal para ver eventos del día -->
<div class="modal fade" id="dayEventsModal" tabindex="-1" aria-labelledby="dayEventsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(to right, #7e57c2, #6a1b9a); color: white;">
                <div class="w-100">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="modal-title mb-0" id="dayEventsModalLabel">Eventos del <span id="modalDay"></span></h5>
                        <span id="eventsCount" class="badge bg-light text-dark"></span>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" id="searchDayEvents" class="form-control" placeholder="Buscar en los eventos de este día...">
                        <button class="btn btn-outline-light" type="button" id="clearSearchDay">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modalEventsList">
                <div class="text-center py-4">
                    <div class="spinner-border text-purple" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script>
let currentDate = new Date();
let currentYear = currentDate.getFullYear();
let currentMonth = currentDate.getMonth() + 1; // Meses de 1-12

// Nombres de meses y días
const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
const dayNames = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];

let eventsByDay = {}; // Almacenar eventos por día
let currentDayEvents = []; // Eventos del día actual en el modal

// Renderizar calendario
async function renderCalendar() {
    // Actualizar título del mes y año
    document.getElementById("currentMonthYear").textContent = `${monthNames[currentMonth - 1]} ${currentYear}`;
    
    // Obtener eventos del mes
    const response = await fetch(`/api/events-by-month?year=${currentYear}&month=${currentMonth}`);
    const data = await response.json();
    
    // Agrupar eventos por día
    eventsByDay = {};
    data.events.forEach(event => {
        if (event.day) {
            if (!eventsByDay[event.day]) {
                eventsByDay[event.day] = [];
            }
            eventsByDay[event.day].push(event);
        }
    });
    
    // Crear calendario
    const calendarGrid = document.getElementById("calendarGrid");
    calendarGrid.innerHTML = "";
    
    // Añadir cabecera con nombres de días
    const headerRow = document.createElement("div");
    headerRow.className = "row text-center fw-bold mb-2";
    headerRow.style.borderBottom = "2px solid #7e57c2";
    dayNames.forEach(dayName => {
        const dayCell = document.createElement("div");
        dayCell.className = "col p-2";
        dayCell.innerHTML = `<small>${dayName}</small>`;
        headerRow.appendChild(dayCell);
    });
    calendarGrid.appendChild(headerRow);
    
    // Obtener primer día de la semana y número de días
    const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
    
    // Crear filas del calendario
    let dayCount = 1;
    let currentRow = null;
    
    for (let i = 0; i < 42; i++) { // 6 filas x 7 días = 42 celdas
        if (i % 7 === 0) {
            currentRow = document.createElement("div");
            currentRow.className = "row mb-2";
        }
        
        const dayCell = document.createElement("div");
        dayCell.className = "col p-1 position-relative";
        
        // Verificar si es un día del mes actual
        const isCurrentMonth = (i >= firstDay && i < firstDay + daysInMonth);
        const dayNumber = isCurrentMonth ? dayCount++ : "";
        
        // Estilo para días del mes actual
        if (isCurrentMonth) {
            dayCell.style.minHeight = "120px";
            dayCell.style.backgroundColor = "#f8f9fa";
            dayCell.style.borderRadius = "8px";
            dayCell.style.padding = "8px";
            dayCell.style.cursor = "pointer";
            dayCell.style.transition = "all 0.2s ease";
            
            // Marcar día actual
            const today = new Date();
            if (currentYear === today.getFullYear() && currentMonth === today.getMonth() + 1 && dayNumber === today.getDate()) {
                dayCell.style.backgroundColor = "#e0d5f7";
                dayCell.style.border = "2px solid #7e57c2";
            }
            
            // Añadir número del día
            dayCell.innerHTML = `<div class="fw-bold mb-1" style="color: #6a1b9a;">${dayNumber}</div>`;
            
            // Añadir eventos del día
            if (eventsByDay[dayNumber] && eventsByDay[dayNumber].length > 0) {
                const eventsList = document.createElement("div");
                eventsList.className = "small";
                
                eventsByDay[dayNumber].slice(0, 3).forEach(event => {
                    const eventDiv = document.createElement("div");
                    eventDiv.className = "mb-1";
                    eventDiv.innerHTML = `
                        <a href="/event/${event.id}" class="text-decoration-none text-dark d-block" style="font-size: 0.8rem;">
                            <i class="fas fa-circle" style="font-size: 0.4rem; color: #7e57c2; vertical-align: middle; margin-right: 4px;"></i>
                            ${event.denominacio.length > 25 ? event.denominacio.substring(0, 25) + '...' : event.denominacio}
                        </a>
                    `;
                    eventsList.appendChild(eventDiv);
                });
                
                // Mostrar contador si hay más de 3 eventos
                if (eventsByDay[dayNumber].length > 3) {
                    const moreDiv = document.createElement("div");
                    moreDiv.className = "text-muted small";
                    moreDiv.innerHTML = `<i class="fas fa-plus"></i> ${eventsByDay[dayNumber].length - 3} más`;
                    eventsList.appendChild(moreDiv);
                }
                
                dayCell.appendChild(eventsList);
                
                // Badge con número de eventos
                const badge = document.createElement("span");
                badge.className = "badge bg-primary position-absolute top-0 end-0";
                badge.style.fontSize = "0.7rem";
                badge.textContent = eventsByDay[dayNumber].length;
                dayCell.appendChild(badge);
            }
            
            // Evento de clic para abrir modal
            dayCell.addEventListener("click", () => {
                openDayEventsModal(dayNumber);
            });
            
            // Efecto hover
            dayCell.addEventListener("mouseenter", () => {
                dayCell.style.transform = "scale(1.02)";
                dayCell.style.boxShadow = "0 4px 12px rgba(126, 87, 194, 0.3)";
            });
            
            dayCell.addEventListener("mouseleave", () => {
                dayCell.style.transform = "scale(1)";
                dayCell.style.boxShadow = "none";
            });
        } else {
            dayCell.style.minHeight = "120px";
            dayCell.style.backgroundColor = "#f0f0f0";
            dayCell.style.borderRadius = "8px";
            dayCell.innerHTML = `<div class="text-muted" style="opacity: 0.3;">${dayNumber || "&nbsp;"}</div>`;
        }
        
        currentRow.appendChild(dayCell);
        
        if ((i + 1) % 7 === 0) {
            calendarGrid.appendChild(currentRow);
        }
    }
}

// Abrir modal con eventos del día
function openDayEventsModal(day) {
    const modal = new bootstrap.Modal(document.getElementById('dayEventsModal'));
    const modalDay = document.getElementById('modalDay');
    const modalEventsList = document.getElementById('modalEventsList');
    const eventsCount = document.getElementById('eventsCount');
    const searchInput = document.getElementById('searchDayEvents');
    
    // Actualizar título del modal
    modalDay.textContent = `${day} de ${monthNames[currentMonth - 1]} ${currentYear}`;
    
    // Limpiar campo de búsqueda
    searchInput.value = '';
    searchInput.focus();
    
    // Mostrar spinner mientras se cargan los eventos
    modalEventsList.innerHTML = `
        <div class="text-center py-4">
            <div class="spinner-border text-purple" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    `;
    
    // Mostrar modal
    modal.show();
    
    // Cargar eventos del día
    setTimeout(() => {
        currentDayEvents = eventsByDay[day] || [];
        
        if (currentDayEvents.length === 0) {
            eventsCount.textContent = '0 eventos';
            modalEventsList.innerHTML = `
                <div class="text-center py-5">
                    <i class="fas fa-calendar-times fa-3x text-muted mb-3"></i>
                    <p class="text-muted">No hay eventos programados para este día.</p>
                </div>
            `;
        } else {
            eventsCount.textContent = `${currentDayEvents.length} evento${currentDayEvents.length > 1 ? 's' : ''}`;
            displayDayEvents(currentDayEvents);
        }
    }, 100);
}

// Mostrar eventos del día
function displayDayEvents(events) {
    const modalEventsList = document.getElementById('modalEventsList');
    
    if (events.length === 0) {
        modalEventsList.innerHTML = `
            <div class="text-center py-5">
                <i class="fas fa-search fa-3x text-muted mb-3"></i>
                <p class="text-muted">No se encontraron eventos con ese criterio de búsqueda.</p>
            </div>
        `;
        return;
    }
    
    let html = `<div class="row g-3">`;
    
    events.forEach(event => {
        const imageUrl = event.imatges || '';
        const dateStart = event.data_inici ? event.data_inici.split('T')[0] : '';
        const dateEnd = event.data_fi ? event.data_fi.split('T')[0] : '';
        const description = event.descripcio || '';
        
        html += `
            <div class="col-12 event-item" data-search="${(event.denominacio + ' ' + description).toLowerCase()}">
                <div class="card h-100 shadow-sm border-0 rounded-3 overflow-hidden" style="border-left: 4px solid #7e57c2;">
                    <div class="row g-0">
                        <div class="col-md-3">
                            ${imageUrl ? `
                                <img src="${imageUrl}" class="img-fluid rounded-start" alt="${event.denominacio}" 
                                     style="height: 150px; object-fit: cover; width: 100%;"
                                     onerror="this.src='https://via.placeholder.com/300x150/e0d5f7/6a1b9a?text=Sin+Imagen'">
                            ` : `
                                <div style="height: 150px; background: linear-gradient(135deg, #e0d5f7, #7e57c2); display: flex; align-items: center; justify-content: center;">
                                    <i class="fas fa-image fa-3x text-white-50"></i>
                                </div>
                            `}
                        </div>
                        <div class="col-md-9">
                            <div class="card-body">
                                <h5 class="card-title fw-bold mb-2">
                                    <a href="/event/${event.id}" class="text-decoration-none text-dark">
                                        ${event.denominacio}
                                    </a>
                                </h5>
                                <p class="card-text text-muted small">${description.length > 100 ? description.substring(0, 100) + '...' : description}</p>
                                
                                <div class="row g-2 mt-2">
                                    <div class="col-auto">
                                        <span class="badge bg-primary">
                                            <i class="fas fa-calendar-alt me-1"></i> ${dateStart}
                                        </span>
                                    </div>
                                    ${dateEnd && dateEnd !== dateStart ? `
                                    <div class="col-auto">
                                        <span class="badge bg-secondary">
                                            <i class="fas fa-calendar-check me-1"></i> Hasta ${dateEnd}
                                        </span>
                                    </div>
                                    ` : ''}
                                </div>
                                
                                <div class="mt-3">
                                    <a href="/event/${event.id}" class="btn btn-sm btn-primary">
                                        <i class="fas fa-eye me-1"></i> Ver detalles
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });
    
    html += `</div>`;
    modalEventsList.innerHTML = html;
}

// Buscar en eventos del día
function searchDayEvents() {
    const searchInput = document.getElementById('searchDayEvents');
    const searchTerm = searchInput.value.toLowerCase().trim();
    const eventsCount = document.getElementById('eventsCount');
    
    if (!searchTerm) {
        // Mostrar todos los eventos si el campo está vacío
        eventsCount.textContent = `${currentDayEvents.length} evento${currentDayEvents.length > 1 ? 's' : ''}`;
        displayDayEvents(currentDayEvents);
        return;
    }
    
    // Filtrar eventos que coincidan con la búsqueda
    const filteredEvents = currentDayEvents.filter(event => {
        const searchContent = (event.denominacio + ' ' + (event.descripcio || '')).toLowerCase();
        return searchContent.includes(searchTerm);
    });
    
    // Actualizar contador
    eventsCount.textContent = `${filteredEvents.length} de ${currentDayEvents.length} evento${currentDayEvents.length > 1 ? 's' : ''}`;
    
    // Mostrar eventos filtrados
    displayDayEvents(filteredEvents);
}

// Limpiar búsqueda
function clearSearchDay() {
    const searchInput = document.getElementById('searchDayEvents');
    searchInput.value = '';
    searchInput.focus();
    searchDayEvents();
}

// Navegación entre meses
document.getElementById("prevMonth").addEventListener("click", () => {
    currentMonth--;
    if (currentMonth < 1) {
        currentMonth = 12;
        currentYear--;
    }
    renderCalendar();
});

document.getElementById("nextMonth").addEventListener("click", () => {
    currentMonth++;
    if (currentMonth > 12) {
        currentMonth = 1;
        currentYear++;
    }
    renderCalendar();
});

// Event listeners para búsqueda
document.getElementById("searchDayEvents").addEventListener("input", searchDayEvents);
document.getElementById("clearSearchDay").addEventListener("click", clearSearchDay);

// Cargar calendario al iniciar
renderCalendar();
</script>
{% endblock %}
