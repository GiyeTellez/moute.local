{% extends "base.html" %}

{% block content %}
<div class="container my-4">
    <h1 class="mb-4 section-title">{{ title }}</h1>
    
    <!-- Panel de filtros -->
    <div class="card shadow-sm border-0 rounded-3 mb-4">
        <div class="card-body">
            <div class="row g-3">
                <!-- Búsqueda general -->
                <div class="col-12 col-md-6">
                    <label for="searchInput" class="form-label fw-bold">Buscar eventos</label>
                    <input type="text" id="searchInput" class="form-control search-input" placeholder="Título, descripción, ubicación...">
                </div>
                
                <!-- Rango de fechas -->
                <div class="col-12 col-md-3">
                    <label for="dateFrom" class="form-label fw-bold">Desde</label>
                    <input type="date" id="dateFrom" class="form-control">
                </div>
                
                <div class="col-12 col-md-3">
                    <label for="dateTo" class="form-label fw-bold">Hasta</label>
                    <input type="date" id="dateTo" class="form-control">
                </div>
                
                <!-- Filtro por precio -->
                <div class="col-12 col-md-4">
                    <label for="priceFilter" class="form-label fw-bold">Precio</label>
                    <select id="priceFilter" class="form-select">
                        <option value="">Todos los precios</option>
                        <option value="free">Gratuitos</option>
                        <option value="paid">De pago</option>
                    </select>
                </div>
                
                <!-- Filtro por categoría -->
                <div class="col-12 col-md-5">
                    <label for="categoryFilter" class="form-label fw-bold">Categoría</label>
                    <select id="categoryFilter" class="form-select">
                        <option value="">Todas las categorías</option>
                        <option value="teatre">Teatre</option>
                        <option value="musica">Música</option>
                        <option value="exposicions">Exposicions</option>
                        <option value="dansa">Dansa</option>
                        <option value="cinema">Cinema</option>
                        <option value="literatura">Llibres i Lletres</option>
                        <option value="gastronomia">Gastronomia</option>
                        <option value="arts_visuals">Arts visuals</option>
                        <option value="tradicional">Tradicional i Popular</option>
                        <option value="familiar">Familiar</option>
                    </select>
                </div>
                
                <!-- Botones de control -->
                <div class="col-12 col-md-3 d-flex align-items-end">
                    <button id="applyFilters" class="btn btn-primary w-100 me-2">
                        <i class="fas fa-filter me-1"></i>Filtrar
                    </button>
                    <button id="clearAllFilters" class="btn btn-outline-secondary w-100">
                        <i class="fas fa-times me-1"></i>Limpiar
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Mensaje de filtros aplicados -->
    <div id="filtersMessage" class="alert alert-info text-center" style="display:none; margin-bottom: 20px;">
        <i class="fas fa-filter me-2"></i>
        <span id="filtersText"></span>
        <button id="clearFiltersBtn" class="btn btn-sm btn-outline-secondary ms-3">
            <i class="fas fa-times me-1"></i>Limpiar filtros
        </button>
    </div>
    
    <div class="row" id="eventsContainer"></div>
    
    <!-- Cargando -->
    <div id="loading" class="text-center my-4" style="display:none;">
        <div class="spinner-border" role="status" style="color: #7e57c2;">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">Cargando eventos...</p>
    </div>
</div>

<script>
let page = 1;
let loading = false;
let isSearching = false;
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
favorites = favorites.map(id => String(id));

// Almacenar filtros actuales
let currentFilters = {
    query: '',
    dateFrom: '',
    dateTo: '',
    price: '',
    category: ''
};

// --------------------------------------------------
// Crear tarjeta de evento (reutilizable)
// --------------------------------------------------
function createEventCard(event) {
    let imageUrl = event.imatges || '';
    if (imageUrl.trim().startsWith('/')) {
        imageUrl = 'https://agenda.cultura.gencat.cat' + imageUrl.trim();
    }

    const card = document.createElement("div");
    card.className = "col-md-4 mb-4";
    card.innerHTML = `
        <div class="card h-100 shadow-sm border-0 rounded-3 overflow-hidden">
            <a href="/event/${event.id}" class="text-decoration-none d-block">
                ${imageUrl ? `
                    <img src="${imageUrl}" 
                         class="card-img-top" 
                         alt="${event.denominacio}" 
                         style="height: 200px; object-fit: cover; width: 100%;"
                         onerror="this.src='https://via.placeholder.com/300x200/e0d5f7/6a1b9a?text=Sin+Imagen'">
                ` : `
                    <div style="height: 200px; background: linear-gradient(135deg, #e0d5f7, #7e57c2); display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-image fa-3x text-white-50"></i>
                    </div>
                `}
            </a>
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 class="card-title fw-bold mb-0">
                        <a href="/event/${event.id}" class="text-dark text-decoration-none">${event.denominacio}</a>
                    </h5>
                    <button class="btn btn-link p-0 favorite-btn" data-id="${event.id}">
                        <i class="far fa-heart fa-lg"></i>
                    </button>
                </div>
                <p class="text-muted small mb-3">${event.descripcio ? event.descripcio.substring(0, 80) + '...' : ''}</p>
                
                <div class="d-flex align-items-center mb-2">
                    <i class="fas fa-calendar-alt me-2" style="color:#7e57c2;"></i>
                    <small>${event.data_inici ? event.data_inici.split('T')[0] : 'Sin fecha'}</small>
                </div>
                <div class="d-flex align-items-center mb-2">
                    <i class="fas fa-map-marker-alt me-2" style="color:#7e57c2;"></i>
                    <small>${event.comarca_i_municipi ? event.comarca_i_municipi.split('/').pop() : 'Sin ubicación'}</small>
                </div>
                
                <!-- Badge de precio -->
                <div class="mt-2">
                    ${event.entrades && (event.entrades.toLowerCase().includes('gratuit') || event.entrades.toLowerCase().includes('gratis') || event.entrades.toLowerCase().includes('gratuïta')) ? 
                        '<span class="badge bg-success">Gratuito</span>' : 
                        '<span class="badge bg-warning text-dark">De pago</span>'
                    }
                </div>
            </div>
        </div>
    `;
    return card;
}

// --------------------------------------------------
// Aplicar filtros
// --------------------------------------------------
function applyFilters() {
    currentFilters.query = document.getElementById('searchInput').value.trim();
    currentFilters.dateFrom = document.getElementById('dateFrom').value;
    currentFilters.dateTo = document.getElementById('dateTo').value;
    currentFilters.price = document.getElementById('priceFilter').value;
    currentFilters.category = document.getElementById('categoryFilter').value;
    
    // Mostrar mensaje de filtros aplicados
    updateFiltersMessage();
    
    // Reiniciar y cargar eventos con filtros
    resetToNormalView();
}

// --------------------------------------------------
// Actualizar mensaje de filtros
// --------------------------------------------------
function updateFiltersMessage() {
    const filters = [];
    
    if (currentFilters.query) filters.push(`Búsqueda: "${currentFilters.query}"`);
    if (currentFilters.dateFrom) filters.push(`Desde: ${currentFilters.dateFrom}`);
    if (currentFilters.dateTo) filters.push(`Hasta: ${currentFilters.dateTo}`);
    if (currentFilters.price === 'free') filters.push('Gratis');
    if (currentFilters.price === 'paid') filters.push('De pago');
    if (currentFilters.category) {
        const categoryNames = {
            'teatre': 'Teatre',
            'musica': 'Música', 
            'exposicions': 'Exposicions',
            'dansa': 'Dansa',
            'cinema': 'Cinema',
            'literatura': 'Llibres i Lletres',
            'gastronomia': 'Gastronomia',
            'arts_visuals': 'Arts visuals',
            'tradicional': 'Tradicional',
            'familiar': 'Familiar'
        };
        filters.push(`Categoría: ${categoryNames[currentFilters.category] || currentFilters.category}`);
    }
    
    if (filters.length > 0) {
        document.getElementById('filtersText').textContent = filters.join(' | ');
        document.getElementById('filtersMessage').style.display = 'block';
    } else {
        document.getElementById('filtersMessage').style.display = 'none';
    }
}

// --------------------------------------------------
// Limpiar todos los filtros
// --------------------------------------------------
function clearAllFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    document.getElementById('priceFilter').value = '';
    document.getElementById('categoryFilter').value = '';
    
    currentFilters = {
        query: '',
        dateFrom: '',
        dateTo: '',
        price: '',
        category: ''
    };
    
    document.getElementById('filtersMessage').style.display = 'none';
    resetToNormalView();
}

// --------------------------------------------------
// Cargar eventos con filtros (scroll infinito)
// --------------------------------------------------
async function loadEvents() {
    if (loading) return;
    loading = true;
    document.getElementById("loading").style.display = "block";

    try {
        // Construir URL con parámetros de filtrado
        let url = `/api/events?page=${page}`;
        if (currentFilters.query) url += `&q=${encodeURIComponent(currentFilters.query)}`;
        if (currentFilters.dateFrom) url += `&date_from=${currentFilters.dateFrom}`;
        if (currentFilters.dateTo) url += `&date_to=${currentFilters.dateTo}`;
        if (currentFilters.price) url += `&price=${currentFilters.price}`;
        if (currentFilters.category) url += `&category=${currentFilters.category}`;

        const response = await fetch(url);
        const data = await response.json();
        document.getElementById("loading").style.display = "none";
        loading = false;

        if (data.events.length === 0) {
            if (page === 1) {
                document.getElementById("eventsContainer").innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-warning text-center">
                            No se encontraron eventos con los filtros aplicados.
                        </div>
                    </div>
                `;
            }
            return;
        }

        const container = document.getElementById("eventsContainer");
        data.events.forEach(event => {
            const card = createEventCard(event);
            container.appendChild(card);
        });

        updateFavoriteButtons();
        page++;
    } catch (error) {
        console.error('Error cargando eventos:', error);
        document.getElementById("loading").style.display = "none";
        loading = false;
    }
}

// --------------------------------------------------
// Resetear a vista normal (sin búsqueda pero con filtros)
// --------------------------------------------------
function resetToNormalView() {
    isSearching = false;
    page = 1;
    document.getElementById("eventsContainer").innerHTML = "";
    loadEvents();
}

// --------------------------------------------------
// Gestión de favoritos
// --------------------------------------------------
function toggleFavorite(eventId) {
    eventId = String(eventId);
    if (favorites.includes(eventId)) {
        favorites = favorites.filter(id => id !== eventId);
    } else {
        favorites.push(eventId);
    }
    localStorage.setItem('favorites', JSON.stringify(favorites));
    updateFavoriteButtons();
}

function updateFavoriteButtons() {
    document.querySelectorAll('.favorite-btn').forEach(btn => {
        const eventId = String(btn.dataset.id);
        const icon = btn.querySelector('i');
        if (favorites.includes(eventId)) {
            icon.classList.remove('far');
            icon.classList.add('fas');
            icon.style.color = '#dc3545';
        } else {
            icon.classList.remove('fas');
            icon.classList.add('far');
            icon.style.color = '';
        }
    });
}

// --------------------------------------------------
// Event listeners
// --------------------------------------------------
document.getElementById("applyFilters").addEventListener("click", applyFilters);
document.getElementById("clearAllFilters").addEventListener("click", clearAllFilters);
document.getElementById("clearFiltersBtn").addEventListener("click", clearAllFilters);

// Aplicar filtros al presionar Enter en el campo de búsqueda
document.getElementById("searchInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        applyFilters();
    }
});

// Aplicar filtros cuando cambian los selects
document.getElementById("priceFilter").addEventListener("change", applyFilters);
document.getElementById("categoryFilter").addEventListener("change", applyFilters);

// Scroll infinito
window.addEventListener("scroll", () => {
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 300 && !loading) {
        loadEvents();
    }
});

// Favoritos
document.addEventListener('click', function(e) {
    const btn = e.target.closest('.favorite-btn');
    if (btn) {
        e.preventDefault();
        toggleFavorite(btn.dataset.id);
    }
});

// Cargar primera página al iniciar
loadEvents();
</script>
{% endblock %}
