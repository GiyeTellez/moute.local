{% extends "base.html" %}

{% block content %}
<div class="container my-4">
    <h1 class="mb-4 section-title">Mis Favoritos</h1>
    
    <!-- Mensaje si no hay favoritos -->
    <div id="noFavorites" class="alert alert-info text-center" style="display: none;">
        Aún no has marcado ningún evento como favorito. Ve a la página de <a href="{{ url_for('events') }}" class="alert-link">Eventos</a> para empezar.
    </div>
    
    <!-- Contenedor de tarjetas -->
    <div class="row" id="favoritesContainer"></div>
</div>

<script>
// IDs de favoritos (strings)
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
favorites = favorites.map(id => String(id));

// Función para cargar y mostrar favoritos
async function loadFavorites() {
    const container = document.getElementById("favoritesContainer");
    const noFavMsg = document.getElementById("noFavorites");
    
    // Limpiar contenedor
    container.innerHTML = '';
    
    if (favorites.length === 0) {
        noFavMsg.style.display = 'block';
        return;
    }
    
    noFavMsg.style.display = 'none';
    
    try {
        // Cargamos eventos paginados hasta obtener todos los necesarios
        let allEvents = [];
        let page = 1;
        let hasMore = true;
        
        while (hasMore && favorites.length > allEvents.length) {
            const response = await fetch(`/api/events?page=${page}&per_page=100`);
            if (!response.ok) {
                throw new Error(`Error HTTP: ${response.status}`);
            }
            const data = await response.json();
            
            allEvents = allEvents.concat(data.events);
            
            if (data.events.length < 100) {
                hasMore = false;
            }
            page++;
        }
        
        // Filtrar solo los favoritos
        const favoriteEvents = allEvents.filter(event => 
            favorites.includes(String(event.id))
        );
        
        if (favoriteEvents.length === 0) {
            noFavMsg.style.display = 'block';
            return;
        }
        
        // Crear tarjetas con el nuevo diseño
        favoriteEvents.forEach(event => {
            const card = document.createElement("div");
            card.className = "col-md-4 mb-4";
            card.innerHTML = `
                <div class="card h-100 shadow-sm border-0 rounded-3 overflow-hidden">
                    <a href="/event/${event.id}" class="text-decoration-none d-block">
                        ${event.imatges ? `
                            <img src="${event.imatges}" 
                                 class="card-img-top" 
                                 alt="${event.denominacio}" 
                                 style="height: 200px; object-fit: cover; width: 100%;"
                                 onerror="this.src='https://via.placeholder.com/300x200/e0d5f7/6a1b9a?text=Sin+Imagen'">
                        ` : `
                            <div style="height: 200px; background: linear-gradient(135deg, #e0d5f7, #7e57c2); display: flex; align-items: center; justify-content: center;">
                                <i class="fas fa-image fa-3x text-white-50"></i>
                            </div>
                        `}
                    </a>
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title fw-bold mb-0">
                                <a href="/event/${event.id}" class="text-dark text-decoration-none">${event.denominacio}</a>
                            </h5>
                            <button class="btn btn-link p-0 favorite-btn" data-id="${event.id}" title="Quitar de favoritos">
                                <i class="fas fa-heart fa-lg" style="color: #dc3545;"></i>
                            </button>
                        </div>
                        <p class="text-muted small mb-3">${event.descripcio ? event.descripcio.substring(0, 80) + '...' : ''}</p>
                        
                        <div class="d-flex align-items-center mb-2">
                            <i class="fas fa-calendar-alt me-2" style="color:#7e57c2;"></i>
                            <small>${event.data_inici ? event.data_inici.split('T')[0] : 'Sin fecha'}</small>
                        </div>
                        <div class="d-flex align-items-center mb-2">
                            <i class="fas fa-map-marker-alt me-2" style="color:#7e57c2;"></i>
                            <small>${event.comarca_i_municipi ? event.comarca_i_municipi.split('/').pop() : 'Sin ubicación'}</small>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        
    } catch (error) {
        console.error('Error al cargar favoritos:', error);
        container.innerHTML = `
            <div class="alert alert-danger">
                No se pudieron cargar los eventos favoritos. Por favor, intenta recargar la página.
            </div>
        `;
    }
}

// Toggle favorito
function toggleFavorite(eventId) {
    eventId = String(eventId);
    
    if (favorites.includes(eventId)) {
        favorites = favorites.filter(id => id !== eventId);
    } else {
        favorites.push(eventId);
    }
    
    localStorage.setItem('favorites', JSON.stringify(favorites));
    
    // Recargar la lista
    loadFavorites();
}

// Delegación de eventos para clics en botones de favorito
document.addEventListener('click', function(e) {
    const btn = e.target.closest('.favorite-btn');
    if (btn) {
        e.preventDefault();
        toggleFavorite(btn.dataset.id);
    }
});

// Cargar al iniciar
document.addEventListener('DOMContentLoaded', loadFavorites);
</script>
{% endblock %}
